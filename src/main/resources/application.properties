# ================================================================
#  CONCEPT: Video 17 - Config Management
#  NOVICE: hardcode values directly in code (localhost, passwords)
#  PRODUCT: values come from AWS Parameter Store / HashiCorp Vault
#             different values per environment (dev/staging/prod)
# ================================================================

# ── Application ────────────────────────────────────────────────── 
spring.application.name=bookvault
server.port=8080

#  CONCEPT: Video 19 - Graceful Shutdown
#  NOVICE: server stops instantly, in-flight requests die
#  PRODUCT: SIGTERM received → finish existing requests → then exit
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

#  Database ─────────────────────────────────────────────────────
#  CONCEPT: Video 12 - PostgreSQL connection
#  NOVICE: hardcode localhost:5432/postgres in code
#  PRODUCT: injected from secrets manager at deploy time, never in code
spring.datasource.url=jdbc:postgresql://localhost:5432/bookvault?stringtype=unspecified
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#  CONCEPT: Video 12 - Connection Pooling (HikariCP)
#  NOVICE: new DB connection created per request → slow + DB overload
#  PRODUCT: pool of 20 connections reused → fast, DB protected
#             Razorpay/Swiggy tune pool size based on traffic patterns
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── JPA ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Flyway Migrations ────────────────────────────────────────────
#  CONCEPT: Video 12 - Database Migrations
#  NOVICE: manually create tables in pgAdmin, no version history
#  PRODUCT: every schema change is a versioned SQL file in git
#             can replay entire DB history from scratch
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Redis ────────────────────────────────────────────────────────
#  CONCEPT: Video 13 - Caching + Video 8 - Session Storage
#  NOVICE: no caching, every request hits PostgreSQL
# PRODUCT: Redis sits in front of DB, serves cached data in <1ms
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── RabbitMQ ─────────────────────────────────────────────────────
#  CONCEPT: Video 14 - Task Queues and Background Jobs
#  NOVICE: send email synchronously in API → slow response, brittle
#  PRODUCT: push to queue → return 201 instantly → worker sends email
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ──────────────────────────────────────────────────────────
#  CONCEPT: Video 8 - Stateless Authentication
#  NOVICE: hardcoded secret "mysecret" in Java code, committed to git
#  PRODUCT: 256-bit random secret from secrets manager, rotated quarterly

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=3600000

# ── Actuator (Health + Metrics) ──────────────────────────────────
# CONCEPT: Video 18 - Monitoring and Observability
#  NOVICE: no health endpoint, you find out service is down from users
#  PRODUCT: load balancer pings /actuator/health every 10 seconds
#             if DOWN → stops routing traffic → alerts team on Slack
management.endpoints.web.exposure.include=health,metrics,info,env
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ── OpenAPI / Swagger ────────────────────────────────────────────
#  CONCEPT: Video 11 - API Design + Documentation
#  NOVICE: no documentation, consumers guess what parameters to send
#  PRODUCT: OpenAPI spec auto-generated, interactive docs always current
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# ── Logging ──────────────────────────────────────────────────────
#  CONCEPT: Video 18 - Structured Logging
#  NOVICE: System.out.println("error happened") → not searchable
#  PRODUCT: JSON logs shipped to New Relic/ELK → searchable by userId, requestId
logging.level.com.bookvault=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ── Feature Flags ────────────────────────────────────────────────
#  CONCEPT: Video 17 - Feature Flags
#  NOVICE: deploy new code to enable feature → risky, no rollback
#  PRODUCT: toggle features without deployment, gradual rollout
#             Zomato uses flags to enable new checkout for 5% of users first
features.elasticsearch-enabled=false
features.email-notifications-enabled=true
features.rate-limiting-enabled=true

# ── Rate Limiting ────────────────────────────────────────────────
#  CONCEPT: Video 14 - Rate Limiting via Redis counters
#  NOVICE: no rate limiting → bot can hammer your API 10,000 times/second
#  PRODUCT: 100 requests/minute per IP, 1000/minute per authenticated user
rate-limit.requests-per-minute=100
rate-limit.authenticated-requests-per-minute=1000
