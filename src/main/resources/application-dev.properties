# ================================================================
# CONCEPT: Video 17 - Environment-Specific Config
# This file OVERRIDES application.properties when running locally
#  PRODUCT: dev has debug logs, relaxed limits, test API keys
#             prod has info logs, strict limits, real API keys
# ================================================================

# More verbose logging in dev
logging.level.com.bookvault=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG

# Show SQL queries in dev only
spring.jpa.show-sql=true

# Relaxed rate limiting in dev so you can test freely
rate-limit.requests-per-minute=10000

# Hardcoded credentials for local development
spring.security.user.name=user
spring.security.user.password=password


